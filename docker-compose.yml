services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: codecriando
      POSTGRES_PASSWORD: codecriando123
      POSTGRES_DB: codecriando
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
